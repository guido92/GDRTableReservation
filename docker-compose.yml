services:
  web-app:
    container_name: tavoli-gdr
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3010:3000"
    volumes:
      - tavoli-data:/app/src/data
      - tavoli-uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/src/data/db.json
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}

volumes:
  tavoli-data:
    name: tavoli-data
  tavoli-uploads:
    name: tavoli-uploads
